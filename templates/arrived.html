<!DOCTYPE html>
<!-- หน้าถึงจุดหมาย (Arrived) — แสดงเมื่อหุ่นยนต์เดินทางถึงห้องปลายทางแล้ว -->
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ถึงจุดหมายแล้ว — ห้อง {{ room_id }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --cyan:   #00E5FF;
            --gold:   #FFCC00;
            --green:  #00FF88;
            --blue:   #004A99;
            --black:  #000000;
            --card:   #0D1526;
            --border: rgba(0,229,255,0.15);
            --muted:  rgba(255,255,255,0.45);
            --ease:   cubic-bezier(0.16,1,0.3,1);
        }

        *, *::before, *::after {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; user-select: none;
        }

        html, body {
            width: 100%; height: 100%;
            background: #000000 !important;
            color: #fff; font-family: 'Exo 2', sans-serif;
            overflow: hidden; color-scheme: dark;
        }

        /* ── Canvas particle burst ── */
        #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* ── Grid พื้นหลัง ── */
        .grid {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── Scanline ── */
        .scan {
            position: fixed; left: 0; right: 0; height: 1px; z-index: 2; pointer-events: none;
            background: linear-gradient(90deg, transparent, rgba(0,255,136,0.15) 50%, transparent);
            animation: scan 7s linear infinite;
        }
        @keyframes scan { 0%{top:-2px} 100%{top:100vh} }

        /* ── Corner brackets ── */
        .br { position: fixed; z-index: 3; width: 44px; height: 44px; pointer-events: none; }
        .br::before, .br::after { content:''; position:absolute; background:var(--green); opacity:.5; }
        .br::before { width:2px; height:26px; }
        .br::after  { width:26px; height:2px; }
        .br.tl{top:20px;left:20px}    .br.tl::before{top:0;left:0}    .br.tl::after{top:0;left:0}
        .br.tr{top:20px;right:20px}   .br.tr::before{top:0;right:0}   .br.tr::after{top:0;right:0}
        .br.bl{bottom:20px;left:20px} .br.bl::before{bottom:0;left:0} .br.bl::after{bottom:0;left:0}
        .br.br2{bottom:20px;right:20px} .br.br2::before{bottom:0;right:0} .br.br2::after{bottom:0;right:0}

        /* ── Layout กลางหน้าจอ ── */
        .page {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: clamp(20px,4vw,48px);
            gap: clamp(16px,3vh,28px);
        }

        /* ── Success icon วงกลม ── */
        .success-ring {
            position: relative;
            width: clamp(120px,18vw,180px);
            height: clamp(120px,18vw,180px);
            flex-shrink: 0;
        }

        /* วงแหวนหมุน — สีเขียวตอนถึง */
        .ring {
            position: absolute; border-radius: 50%;
            border: 2px solid transparent; pointer-events: none;
        }
        .ring-a { inset:-8px;  border-top-color:var(--green); border-right-color:rgba(0,255,136,.3); animation:rot 8s linear infinite; }
        .ring-b { inset:6px;   border-bottom-color:var(--gold); border-left-color:rgba(255,204,0,.3); animation:rot 5s linear infinite reverse; }
        .ring-c { inset:20px;  border-top-color:rgba(0,255,136,.4); animation:rot 12s linear infinite; }
        @keyframes rot { to{transform:rotate(360deg)} }

        /* วงกลมไอคอน checkmark */
        .check-circle {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,136,0.12) 0%, rgba(0,255,136,0.04) 100%);
            border: 2px solid rgba(0,255,136,0.4);
            display: flex; align-items: center; justify-content: center;
            animation: popIn 0.6s var(--ease) both;
        }
        .check-circle i {
            font-size: clamp(2.5rem,6vw,4rem);
            color: var(--green);
            filter: drop-shadow(0 0 16px rgba(0,255,136,0.6));
            animation: checkBounce 0.8s var(--ease) 0.3s both;
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        @keyframes checkBounce {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.2); }
            100% { transform: scale(1);   opacity: 1; }
        }

        /* ── ข้อความหลัก ── */
        .text-block { text-align: center; flex-shrink: 0; }

        .arrived-title {
            display: block;
            font-family: 'Orbitron', monospace; font-weight: 900;
            font-size: clamp(1.6rem,5vw,3.5rem);
            letter-spacing: 3px; line-height: 1.1;
            color: var(--green);
            text-shadow: 0 0 20px rgba(0,255,136,0.5), 0 0 40px rgba(0,255,136,0.2);
            animation: fadeUp 0.7s var(--ease) 0.2s both;
        }

        .room-label {
            display: block;
            font-family: 'Orbitron', monospace; font-weight: 700;
            font-size: clamp(1.2rem,3.5vw,2.2rem);
            color: var(--gold);
            text-shadow: 0 0 14px rgba(255,204,0,0.4);
            letter-spacing: 2px; margin-top: 6px;
            animation: fadeUp 0.7s var(--ease) 0.35s both;
        }

        .sub-text {
            display: block;
            font-size: clamp(0.8rem,2vw,1rem); font-weight: 300;
            color: var(--muted); letter-spacing: 1px;
            margin-top: 8px;
            animation: fadeUp 0.7s var(--ease) 0.5s both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── Info card — แสดงข้อมูลห้อง ── */
        .info-card {
            background: rgba(0,255,136,0.04);
            border: 1px solid rgba(0,255,136,0.2);
            border-left: 4px solid var(--green);
            border-radius: 14px;
            padding: clamp(12px,2vh,18px) clamp(16px,3vw,24px);
            max-width: 600px; width: 100%;
            flex-shrink: 0;
            animation: fadeUp 0.7s var(--ease) 0.55s both;
        }
        .info-label {
            font-size: clamp(0.65rem,1.2vw,0.72rem);
            color: var(--green); font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 6px;
        }
        .info-text {
            font-size: clamp(0.78rem,1.6vw,0.92rem);
            color: rgba(255,255,255,0.75); line-height: 1.5;
        }

        /* ── ปุ่ม ── */
        .btn-group {
            display: flex; gap: 14px; flex-wrap: wrap;
            justify-content: center; flex-shrink: 0;
            animation: fadeUp 0.7s var(--ease) 0.7s both;
        }

        .btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: clamp(14px,2.5vh,18px) clamp(28px,5vw,52px);
            min-height: 52px;
            border-radius: 100px; cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            font-size: clamp(0.9rem,2vw,1.1rem); font-weight: 700;
            border: 2px solid transparent;
            transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
            text-decoration: none;
        }
        .btn:active { transform: scale(0.95); }

        /* ปุ่มหลัก — กลับหน้าแรก (สีเขียว) */
        .btn-home {
            background: var(--green);
            color: #000;
            box-shadow: 0 0 20px rgba(0,255,136,0.25);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(0,255,136,0.5), 0 8px 20px rgba(0,0,0,0.4);
        }

        /* ปุ่มรอง — ส่งหุ่นกลับ */
        .btn-return {
            background: transparent;
            border-color: rgba(0,229,255,0.4);
            color: var(--cyan);
        }
        .btn-return:hover {
            background: rgba(0,229,255,0.08);
            border-color: var(--cyan);
            transform: translateY(-3px);
        }

        /* ── Auto-return countdown ── */
        .countdown {
            font-size: clamp(0.7rem,1.4vw,0.8rem);
            color: var(--muted); letter-spacing: 1px;
            flex-shrink: 0;
            animation: fadeUp 0.7s var(--ease) 0.85s both;
        }
        .countdown span { color: var(--gold); font-weight: 600; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration:.001ms !important; transition-duration:.001ms !important; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="grid"></div>
    <div class="scan"></div>
    <div class="br tl"></div>
    <div class="br tr"></div>
    <div class="br bl"></div>
    <div class="br br2"></div>

    <div class="page">

        <!-- Success icon -->
        <div class="success-ring">
            <div class="ring ring-a"></div>
            <div class="ring ring-b"></div>
            <div class="ring ring-c"></div>
            <div class="check-circle">
                <i class="fas fa-check" aria-hidden="true"></i>
            </div>
        </div>

        <!-- ข้อความ -->
        <div class="text-block">
            <span class="arrived-title">ถึงจุดหมายแล้ว!</span>
            <span class="room-label">ห้อง {{ room_id }}</span>
            <span class="sub-text">ขอบคุณที่ใช้บริการ UDRU CCE Navigation Robot</span>
        </div>

        <!-- Info card — วิชาที่สอนในห้อง -->
        {% set info = room_info %}
        {% if info and info.subjects %}
        <div class="info-card">
            <div class="info-label">
                <i class="fas fa-book-open" style="margin-right:6px"></i>วิชาที่สอนในห้องนี้
            </div>
            <div class="info-text">{{ info.subjects }}</div>
        </div>
        {% endif %}

        <!-- ปุ่ม -->
        <div class="btn-group">
            <a href="/" class="btn btn-home" aria-label="กลับหน้าหลัก">
                <i class="fas fa-house" aria-hidden="true"></i>
                กลับหน้าหลัก
            </a>
            <button class="btn btn-return" onclick="returnToBase()" aria-label="ส่งหุ่นกลับจุดเริ่มต้น">
                <i class="fas fa-rotate-left" aria-hidden="true"></i>
                ส่งหุ่นกลับ
            </button>
        </div>

        <!-- นับถอยหลัง auto-return -->
        <p class="countdown">
            กลับหน้าหลักอัตโนมัติใน <span id="count">30</span> วินาที
        </p>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>

    // ── Particle Burst — ยิงอนุภาคเฉลิมฉลองตอนโหลดหน้า ──────────
    (function () {
        const canvas = document.getElementById('canvas');
        const ctx    = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        addEventListener('resize', resize); resize();

        // สีที่ใช้ยิง particle
        const COLORS = ['#00FF88','#00E5FF','#FFCC00','#ffffff','#00FF88','#00FF88'];

        class Particle {
            constructor() {
                // เริ่มจากกลางหน้าจอ
                this.x  = W / 2; this.y = H / 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.r  = Math.random() * 4 + 1;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = 1;
                this.gravity = 0.15;
                this.drag    = 0.97;
            }
            update() {
                this.vy   += this.gravity;
                this.vx   *= this.drag;
                this.vy   *= this.drag;
                this.x    += this.vx;
                this.y    += this.vy;
                this.alpha -= 0.018;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle   = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur  = 6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        let particles = [];
        let burstDone = false;

        // ยิง particle burst 3 ครั้งติดกัน
        function burst(count) {
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        // burst ครั้งแรกทันที
        burst(120);
        setTimeout(() => burst(80),  400);
        setTimeout(() => burst(60),  800);
        setTimeout(() => { burstDone = true; }, 1200);

        function loop() {
            ctx.clearRect(0, 0, W, H);
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            if (particles.length > 0 || !burstDone) requestAnimationFrame(loop);
        }
        loop();
    })();

    // ── Auto countdown กลับหน้าแรก ───────────────────────────────
    let countVal = 30;
    const countEl = document.getElementById('count');

    const countTimer = setInterval(() => {
        countVal--;
        countEl.textContent = countVal;
        if (countVal <= 0) {
            clearInterval(countTimer);
            window.location.href = '/';
        }
    }, 1000);

    // ── ส่งหุ่นกลับ node 1 (Home) ──────────────────────────────────
    function returnToBase() {
        // หยุด countdown ไม่ให้เด้งหน้าระหว่างรอ
        clearInterval(countTimer);
        countEl.parentElement.textContent = '';

        Swal.fire({
            title: 'ส่งหุ่นกลับจุดเริ่มต้น?',
            text: 'หุ่นยนต์จะเดินทางกลับไปยัง Home (node 1)',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#00E5FF',
            cancelButtonColor:  '#555',
            confirmButtonText: '<i class="fas fa-rotate-left"></i> ยืนยัน',
            cancelButtonText:  'ยกเลิก',
            background: '#0D1526', color: '#ffffff',
            backdrop: 'rgba(0,0,0,0.8)',
        }).then(result => {
            if (result.isConfirmed) {
                // สั่งให้หุ่นเดินกลับ node 1 ผ่าน Flask API
                fetch('/api/move_to/Home')
                    .catch(() => {})
                    .finally(() => {
                        window.location.href = '/';
                    });
            } else {
                // ถ้ายกเลิก เริ่มนับใหม่
                countVal = 30;
                countEl.parentElement.innerHTML =
                    `กลับหน้าหลักอัตโนมัติใน <span id="count">30</span> วินาที`;
                const newCountEl = document.getElementById('count');
                const newTimer = setInterval(() => {
                    countVal--;
                    newCountEl.textContent = countVal;
                    if (countVal <= 0) {
                        clearInterval(newTimer);
                        window.location.href = '/';
                    }
                }, 1000);
            }
        });
    }

    </script>
</body>
</html>
