<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>CCE UDRU - Smart Navigation Robot</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --udru-blue: #004a99;
            --udru-gold: #ffcc00;
            --cce-cyan: #00e5ff;
            --font-main: 'Kanit', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            height: 100%; width: 100%; margin: 0; padding: 0;
            font-family: var(--font-main);
            background: #0a192f;
            /* แก้พื้นหลังเป็น Grid แบบโค้ดเดิม (50px) */
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: white;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Fullscreen Button จากโค้ดใหม่ (วงกลม/เบลอ) */
        .fullscreen-btn {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: white; padding: 15px; border-radius: 50%;
            cursor: pointer; backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .fullscreen-btn:hover { background: rgba(0, 229, 255, 0.15); border-color: var(--cce-cyan); }

        /* Main Card ปรับความโปร่งแสงและขอบตามโค้ดเดิม */
        .main-card {
            z-index: 1; text-align: center; width: 90%; max-width: 800px;
            padding: 60px 40px;
            background: rgba(10, 25, 47, 0.8); /* เข้มขึ้นตามโค้ดเดิม */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 229, 255, 0.2);
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.1), inset 0 0 20px rgba(0, 229, 255, 0.05);
            position: relative;
        }

        /* รูปภาพพร้อมวงแหวนหมุน */
        .dept-image-container {
            width: 200px; height: 200px; margin: 0 auto 35px auto;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        .dept-image-container::after {
            content: ''; position: absolute; inset: -10px;
            border: 2px dashed var(--cce-cyan);
            border-radius: 50%; opacity: 0.3;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .dept-image {
            width: 170px; height: 170px; border-radius: 50%;
            border: 5px solid var(--udru-blue);
            box-shadow: 0 0 30px rgba(0, 74, 153, 0.5);
            object-fit: cover;
            z-index: 2;
        }

        h1 {
            font-size: 3.8rem; margin: 0; font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffffff 50%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.6rem; color: var(--udru-gold);
            font-weight: 400; margin-top: 10px; margin-bottom: 50px;
            letter-spacing: 1px; line-height: 1.4;
        }

        /* ปุ่มกดเลือกห้อง (ใช้ทรงโค้ดใหม่แต่สีทองตามใจชอบ) */
        .start-btn {
            background: transparent;
            color: var(--udru-gold);
            border: 2px solid var(--udru-gold);
            padding: 22px 60px;
            font-size: 1.8rem; font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex; align-items: center; gap: 15px;
            text-transform: uppercase;
        }

        .start-btn:hover {
            background: var(--udru-gold);
            color: #0a192f;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.5);
            transform: scale(1.05);
        }

        /* ส่วน IDLE ยังคงเดิมตามที่แจ้ง */
        .idle {
            position: fixed; inset: 0;
            background: #050c1a;
            display: none; justify-content: center; align-items: center;
            flex-direction: column; z-index: 9999;
            cursor: pointer;
        }
        .idle.active { display: flex; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cce-tag { color: var(--udru-gold); font-size: 2.2rem; font-weight: 600; margin-top: 25px; letter-spacing: 5px; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/idle.css') }}">
</head>
<body>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">
        <i class="fas fa-expand-arrows-alt"></i>
    </button>

    <div class="main-card">
        <div class="dept-image-container">
            <img src="/static/images/comengi.jpg" alt="CCE UDRU" class="dept-image">
        </div>
        
        <h1>UDRU ROBOT</h1>
        <h2>วิศวกรรมคอมพิวเตอร์และการสื่อสาร<br>มหาวิทยาลัยราชภัฏอุดรธานี</h2>

        <button class="start-btn" onclick="goToRooms()">
            <i class="fas fa-map-location-dot"></i>
            <span>เลือกห้องเรียน</span>
        </button>
    </div>

    <div id="idle-screen" class="idle" onclick="wakeUp(event)">
        <div class="robot-face-canvas">
            <div class="antenna-l"><div class="antenna-tip"></div></div>
            <div class="antenna-r"><div class="antenna-tip"></div></div>
            <div class="eyes-container">
                <div class="robot-eye"><div class="pupil"></div></div>
                <div class="robot-eye"><div class="pupil"></div></div>
            </div>
            <div class="robot-mouth"></div>
        </div>
        
        <div class="cce-tag">CCE UDRU</div>
        <p style="color: #00e5ff; font-weight: 300; margin-top: 10px;">สาขาวิศวกรรมคอมพิวเตอร์และการสื่อสาร</p>
        <p class="idle-text" style="font-size: 1.2rem; margin-top: 40px; opacity: 0.5;">แตะหน้าจอเพื่อเริ่มต้น</p>
    </div>

    <script>
        const IDLE_TIME = 30000; 
        let idleTimer;

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.error(e));
            } else {
                document.exitFullscreen();
            }
        }

        function goToRooms() {
            const btn = document.querySelector('.start-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>กำลังโหลด...</span>';
            setTimeout(() => {
                window.location.href = "/room"; 
            }, 500);
        }

        function showIdle() {
            document.getElementById("idle-screen").classList.add("active");
        }

        function hideIdle() {
            document.getElementById("idle-screen").classList.remove("active");
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (!document.getElementById("idle-screen").classList.contains("active")) {
                idleTimer = setTimeout(showIdle, IDLE_TIME);
            }
        }

        function wakeUp(event) {
            if (event) event.stopPropagation();
            hideIdle();
            resetIdleTimer();
        }

        ["touchstart", "mousedown"].forEach(evt => {
            document.addEventListener(evt, resetIdleTimer, true);
        });

        resetIdleTimer();
    </script>
</body>
</html>
