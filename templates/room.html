<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เลือกห้องปลายทาง - UDRU Robot</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --udru-blue: #004a99;
            --udru-gold: #ffcc00;
            --cce-cyan: #00e5ff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .fullscreen-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 100;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn svg {
            width: 25px;
            height: 25px;
            fill: white;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: white;
        }

        #status {
            font-size: 1.2rem;
            opacity: 0.85;
            margin-bottom: 30px;
            color: var(--cce-cyan);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }

        /* ปรับแต่ง Scrollbar สำหรับ Grid */
        .grid::-webkit-scrollbar {
            width: 8px;
        }
        .grid::-webkit-scrollbar-thumb {
            background: var(--udru-gold);
            border-radius: 10px;
        }

        .room-btn {
            padding: 25px 15px;
            font-size: 1.8rem;
            border: 2px solid rgba(0, 229, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            background: rgba(0, 74, 153, 0.2);
            color: #00e5ff;
            font-weight: 600;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .room-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            transform: translateY(-5px);
        }

        .room-btn:active {
            transform: scale(0.95);
        }

        .room-btn span {
            color: var(--udru-gold);
            display: block;
            font-size: 0.9rem;
            font-weight: 300;
            margin-top: 5px;
        }

        .back-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 35px;
            font-size: 1.1rem;
            background: rgba(255,82,82,0.1);
            border: 1px solid #ff5252;
            border-radius: 50px;
            color: #ff8a80;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,82,82,0.2);
        }

        /* Responsive สำหรับหน้าจอแนวตั้งหรือหน้าจอเล็ก */
        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<button class="fullscreen-btn" onclick="toggleFullscreen()">
    <svg viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
    </svg>
</button>

<div class="container">
    <h1>เลือกห้องปลายทาง</h1>
    <p id="status">กรุณาเลือกห้องที่ต้องการให้หุ่นยนต์นำทาง</p>

    <div class="grid">
        <button class="room-btn" onclick="selectRoom('1301')">1301 <span>ห้องปฏิบัติการคอมพิวเตอร์</span></button>
        <button class="room-btn" onclick="selectRoom('1302')">1302 <span>ห้องวงจรไฟฟ้า</span></button>
        <button class="room-btn" onclick="selectRoom('1303b')">1303b <span>สำนักงาน/ยานยนต์ไฟฟ้า</span></button>
        <button class="room-btn" onclick="selectRoom('1304a')">1304a <span>ห้องปฏิบัติการเครือข่าย A</span></button>
        <button class="room-btn" onclick="selectRoom('1304b')">1304b <span>ห้องปฏิบัติการ AI B</span></button>
        <button class="room-btn" onclick="selectRoom('1305')">1305 <span>ห้องเครือข่ายไร้สาย</span></button>
        <button class="room-btn" onclick="selectRoom('1307')">1307 <span>ห้องหุ่นยนต์/Drone</span></button>
        <button class="room-btn" onclick="selectRoom('1306')">1306 <span>ห้องพักอาจารย์</span></button>
    </div>

    <a href="/" class="back-btn">← กลับหน้าหลัก</a>
</div>

<script>
/* บังคับ Fullscreen */
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.log("Fullscreen error:", err);
        });
    } else {
        document.exitFullscreen();
    }
}

/* เลือกห้อง */
function selectRoom(roomId) {
    const statusLabel = document.getElementById("status");
    statusLabel.innerText = "🤖 กำลังเตรียมการนำทางไปห้อง " + roomId + "...";
    
    // 1. เรียก API สั่งหุ่นยนต์เคลื่อนที่
    fetch('/api/move_to/' + roomId)
        .then(res => res.json())
        .then(data => {
            console.log("Robot status:", data.status);
            // 2. เมื่อ API ตอบกลับ ให้เปลี่ยนหน้าไปที่ URL /navigate/ห้อง (ตามโครงสร้าง Route ใหม่)
            // วิธีนี้จะไปเรียกฟังก์ชัน navigate_to_room ใน app.py เพื่อดึงคลิปวิดีโอมาโชว์
            window.location.href = '/navigate/' + roomId;
        })
        .catch(err => {
            console.error("Error:", err);
            statusLabel.innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ";
            alert("ไม่สามารถเชื่อมต่อกับระบบควบคุมหุ่นยนต์ได้");
        });
}

/* ป้องกัน Gesture พื้นฐานที่อาจกวน UI หุ่นยนต์ */
document.addEventListener('touchmove', function (e) {
    if (e.scale !== 1) e.preventDefault();
}, { passive: false });
</script>

</body>
</html>
