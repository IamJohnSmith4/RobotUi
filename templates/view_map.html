<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แผนที่ — ห้อง {{ room_id }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --cyan:   #00E5FF;
            --gold:   #FFCC00;
            --green:  #00FF88;
            --red:    #FF5252;
            --black:  #000000;
            --card:   #0D1526;
            --border: rgba(0,229,255,0.15);
            --muted:  rgba(255,255,255,0.45);
            --ease:   cubic-bezier(0.16,1,0.3,1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }

        html, body {
            width: 100%; height: 100%;
            background: #000000 !important;
            color: #fff; font-family: 'Exo 2', sans-serif;
            overflow: hidden; color-scheme: dark;
        }

        /* พื้นหลัง grid */
        .grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* Layout */
        .page {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            padding: clamp(12px, 2vw, 20px);
            gap: clamp(8px, 1.5vh, 14px);
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .back-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; min-height: 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 100px;
            color: var(--muted); font-family: 'Exo 2', sans-serif;
            font-size: 0.85rem; font-weight: 500;
            cursor: pointer; text-decoration: none;
            transition: all 0.2s var(--ease);
        }
        .back-btn:hover { background: rgba(0,229,255,0.08); color: var(--cyan); border-color: rgba(0,229,255,.3); }

        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(0.9rem, 2.2vw, 1.4rem);
            font-weight: 700; letter-spacing: 2px;
            flex: 1; text-align: center;
        }
        .page-title span { color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.3); }

        /* Status bar */
        .status-bar {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 8px 16px; min-height: 40px;
            background: rgba(0,229,255,0.04);
            border: 1px solid var(--border); border-radius: 10px;
            font-size: clamp(0.75rem, 1.5vw, 0.85rem);
            color: var(--cyan); flex-shrink: 0;
        }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 6px var(--green);
            flex-shrink: 0; animation: ldp 1.5s ease-in-out infinite;
        }
        @keyframes ldp { 0%,100%{opacity:1} 50%{opacity:.2} }

        /* Map container */
        .map-wrap {
            flex: 1; min-height: 0;
            background: rgba(13,21,38,0.7);
            border: 2px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* SVG map */
        #floor-map {
            width: 100%; height: 100%;
            max-width: 100%; max-height: 100%;
        }

        /* ห้องใน SVG */
        .room {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .room:hover .room-fill { opacity: 0.9; }
        .room:active .room-fill { opacity: 0.7; }

        /* Robot marker */
        #robot-marker {
            transition: all 1.2s var(--ease);
        }

        /* Legend */
        .legend {
            display: flex; gap: clamp(10px,2vw,20px);
            justify-content: center; align-items: center;
            flex-wrap: wrap; flex-shrink: 0;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: clamp(0.62rem,1.2vw,0.72rem); color: var(--muted); }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

        /* Controls */
        .controls {
            display: flex; gap: 10px; justify-content: center; flex-shrink: 0;
        }
        .btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px; min-height: 44px;
            border-radius: 100px; cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            font-size: clamp(0.8rem,1.6vw,0.9rem); font-weight: 600;
            border: 2px solid transparent; transition: all 0.2s var(--ease);
            text-decoration: none;
        }
        .btn-back { background: rgba(0,229,255,0.06); border-color: rgba(0,229,255,0.3); color: var(--cyan); }
        .btn-back:hover { background: rgba(0,229,255,0.15); border-color: var(--cyan); }
        .btn-cancel { background: rgba(255,82,82,0.08); border-color: rgba(255,82,82,0.4); color: #ff8a80; }
        .btn-cancel:hover { background: rgba(255,82,82,0.18); border-color: var(--red); }
        .btn:active { transform: scale(0.95); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
        }
    </style>
</head>

                <!-- Node 11: หน้า EN1308 -->
                <g id="node-11">
                    <circle cx="335" cy="545" r="10" fill="#0d1830" stroke="rgba(0,229,255,0.5)" stroke-width="1.5"/>
                    <text x="335" y="550" text-anchor="middle" font-family="Orbitron,monospace" font-size="8" fill="rgba(0,229,255,0.8)">11</text>
                </g>

                <!-- ── Robot marker (เริ่มที่ node 1) ── -->
                <g id="robot-marker">
                    <circle id="ping" cx="0" cy="0" r="10" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0">
                        <animate attributeName="r" from="10" to="24" dur="1.8s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" from="0.8" to="0" dur="1.8s" repeatCount="indefinite"/>
                    </circle>
                    <circle id="robot-dot" cx="0" cy="0" r="10" fill="#00E5FF" stroke="#000" stroke-width="1.5"/>
                    <text id="robot-icon" x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#000">🤖</text>
                </g>

                <!-- ── Target marker ── -->
                <g id="target-marker" opacity="0">
                    <circle cx="0" cy="0" r="14" fill="none" stroke="#FFCC00" stroke-width="2" stroke-dasharray="3 2">
                        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" additive="sum"/>
                    </circle>
                    <circle cx="0" cy="0" r="4" fill="#FFCC00" opacity="0.8"/>
                </g>

            </svg>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:#00E5FF;opacity:0.7"></div>
                <span>CCE</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#FF3D00;opacity:0.7"></div>
                <span>EL</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#00FF88;opacity:0.7"></div>
                <span>สำนักงาน/อาจารย์</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#FFCC00;opacity:0.7"></div>
                <span>วัสดุอุปกรณ์</span>
            </div>
            <div class="legend-item" style="gap:6px">
                <div style="width:10px;height:10px;border-radius:50%;background:#00E5FF;box-shadow:0 0 6px #00E5FF"></div>
                <span>หุ่นยนต์</span>
            </div>
            <div class="legend-item" style="gap:6px">
                <div style="width:10px;height:10px;border-radius:50%;border:2px solid #FFCC00"></div>
                <span>เป้าหมาย</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <a href="/navigate/{{ room_id }}" class="btn btn-back">
                <i class="fas fa-video"></i>
                วิดีโอ
            </a>
            <button class="btn btn-cancel" onclick="cancelNav()">
                <i class="fas fa-xmark"></i>
                ยกเลิก
            </button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
    const ROOM_ID   = "{{ room_id }}";
    const ROBOT_IP  = "172.83.9.108";

    /* ── ตำแหน่ง node แต่ละจุดบน SVG ── */
    const NODE_POS = {
        1:  { x: 145, y: 580 }, /* Home — ใกล้ elevator */
        2:  { x: 145, y: 455 }, /* หน้า EN1301 */
        3:  { x: 145, y: 345 }, /* หน้า EN1302 */
        4:  { x: 145, y: 230 }, /* แยกกลาง */
        5:  { x: 240, y: 145 }, /* หน้า EN1303A/B */
        6:  { x: 240, y: 50  }, /* หน้า EN1304A */
        7:  { x: 240, y: 145 }, /* หน้า EN1304B */
        8:  { x: 335, y: 267 }, /* หน้า EN1305 */
        9:  { x: 335, y: 360 }, /* หน้า EN1306 */
        10: { x: 335, y: 454 }, /* หน้า EN1307 */
        11: { x: 335, y: 545 }  /* หน้า EN1308 */
    };

    const ROOM_TO_NODE = {
        "1301":2, "1302":3, "1303A":4, "1303B":5,
        "1304A":6, "1304B":7, "1305":8, "1306":9,
        "1307":10, "1308":11
    };

    const TARGET_NODE = ROOM_TO_NODE[ROOM_ID.toUpperCase()] || 0;

    /* แสดง target marker ที่ห้องปลายทาง */
    if (TARGET_NODE && NODE_POS[TARGET_NODE]) {
        const tm = document.getElementById('target-marker');
        const pos = NODE_POS[TARGET_NODE];
        tm.setAttribute('transform', `translate(${pos.x},${pos.y})`);
        tm.setAttribute('opacity', '1');
        highlightTargetRoom();
    }

    /* ไฮไลท์ห้องปลายทาง */
    function highlightTargetRoom() {
        const roomEl = document.getElementById('room-' + ROOM_ID.toUpperCase());
        if (roomEl) {
            roomEl.setAttribute('stroke-opacity', '1');
            roomEl.setAttribute('stroke-width', '2.5');
            roomEl.setAttribute('fill', '#0d1e35');
        }
    }

    /* ไฮไลท์ห้องที่แตะ */
    function highlightRoom(id) {
        document.querySelectorAll('.room-fill').forEach(r => {
            r.setAttribute('stroke-opacity', '0.4');
            r.setAttribute('stroke-width', '1.5');
        });
        const el = document.getElementById('room-' + id);
        if (el) {
            el.setAttribute('stroke-opacity', '1');
            el.setAttribute('stroke-width', '2.5');
        }
    }

    /* ── อัปเดตตำแหน่งหุ่นยนต์ ── */
    function moveRobot(node) {
        if (!NODE_POS[node]) return;
        const pos = NODE_POS[node];
        const marker = document.getElementById('robot-marker');
        const dot    = document.getElementById('robot-dot');
        const icon   = document.getElementById('robot-icon');
        const ping   = document.getElementById('ping');

        /* เลื่อน group ทั้งหมดไปตำแหน่งใหม่ */
        marker.setAttribute('transform', `translate(${pos.x},${pos.y})`);

        /* อัปเดต cx/cy ของ ping ด้วย */
        ping.setAttribute('cx', 87);
        ping.setAttribute('cy', 432);
    }

    /* ── Poll status ทุก 2 วิ ── */
    let simNode = 1;

    function updateMap() {
        fetch('/api/status')
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(data => {
                /* รองรับทั้ง current_location และ current_node */
                const node = data.current_location ?? data.current_node ?? 1;
                moveRobot(node);

                /* อัปเดต status text */
                const statusText = document.getElementById('status-text');
                if (data.is_navigating === false && String(node) === String(TARGET_NODE)) {
                    statusText.textContent = '✓ หุ่นยนต์ถึงจุดหมายแล้ว';
                    document.getElementById('live-dot').style.background = '#FFCC00';
                    document.getElementById('live-dot').style.boxShadow  = '0 0 6px #FFCC00';
                } else {
                    statusText.textContent = `หุ่นยนต์อยู่ที่ node ${node} — กำลังมุ่งหน้าไปห้อง ${ROOM_ID}`;
                }
            })
            .catch(() => {
                /* เชื่อมไม่ได้ — จำลองเดิน */
                simulateMove();
                document.getElementById('status-text').textContent = 'ไม่พบการเชื่อมต่อ — แสดงการจำลอง';
            });
    }

    /* จำลองการเดินทีละ node */
    function simulateMove() {
        if (simNode < TARGET_NODE) {
            simNode++;
            moveRobot(simNode);
        }
    }

    setInterval(updateMap, 2000);
    updateMap(); // เรียกทันที

    /* ── ยกเลิก ── */
    function cancelNav() {
        Swal.fire({
            title: 'ยกเลิกการนำทาง?',
            text: 'หุ่นยนต์จะหยุดการเคลื่อนที่',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#FF5252',
            cancelButtonColor: '#00E5FF',
            confirmButtonText: 'ยืนยัน',
            cancelButtonText: 'กลับ',
            background: '#0D1526', color: '#ffffff',
            backdrop: 'rgba(0,0,0,0.8)',
        }).then(r => {
            if (r.isConfirmed) {
                fetch('/stop').catch(() => {}).finally(() => {
                    window.location.href = '/room';
                });
            }
        });
    }
    </script>
</body>
</html>
