<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDRU CCE - Realtime Mapping</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --udru-blue: #004a99; 
            --udru-gold: #ffcc00; 
            --cce-cyan: #00e5ff; 
            --bg-dark: #050c1a;
        }
        
        body {
            margin: 0; background: var(--bg-dark); color: white; font-family: 'Kanit', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Top Header: แสดงเป้าหมายและ Progress */
        .header {
            padding: 15px 25px;
            background: rgba(10, 25, 47, 0.9);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* แถบเปอร์เซ็นต์การเดินทาง */
        .nav-progress-container {
            width: 40%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; overflow: hidden;
        }
        .nav-progress-bar {
            width: 65%; /* ตัวเลขสมมติ */
            background: linear-gradient(90deg, var(--udru-blue), var(--cce-cyan));
            height: 100%; border-radius: 10px; transition: 0.5s;
        }

        /* พื้นที่แผนที่กว้างขวาง */
        .map-viewport {
            flex-grow: 1; position: relative; margin: 15px;
            background: #000; border-radius: 20px;
            border: 2px solid rgba(0, 229, 255, 0.3);
            box-shadow: inset 0 0 30px rgba(0, 229, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
        }

        #realtime-map {
            width: 95%; height: 95%; object-fit: contain;
            filter: hue-rotate(180deg) brightness(1.2); /* ปรับสี Map ให้เข้ากับธีมถ้าจำเป็น */
        }

        /* Telemetry HUD (Heads-Up Display) */
        .hud-overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(10, 25, 47, 0.85);
            padding: 20px; border-radius: 15px;
            border-left: 4px solid var(--cce-cyan);
            backdrop-filter: blur(10px);
        }

        .hud-item { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .hud-item i { color: var(--udru-gold); width: 20px; }

        /* Bottom Controls */
        .controls {
            padding: 20px; background: rgba(10, 25, 47, 0.9);
            display: flex; gap: 20px; justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 12px 35px; border-radius: 12px; border: none; font-family: 'Kanit';
            cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-video { background: var(--udru-gold); color: #000; }
        .btn-cancel { background: #ff5252; color: white; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span style="opacity: 0.6; font-size: 0.9rem;">กำลังมุ่งหน้าสู่:</span>
            <div style="font-size: 1.6rem; font-weight: 600; color: var(--udru-gold);">
                <i class="fas fa-location-dot"></i> ห้อง {{ room_id }}
            </div>
        </div>
        
        <div class="nav-progress-container">
            <div class="nav-progress-bar"></div>
        </div>

        <div id="connection-status" style="color: #00ff00; font-size: 0.9rem;">
            <i class="fas fa-circle-check"></i> ROS NODE: ACTIVE
        </div>
    </div>

    <div class="map-viewport">
        <img id="realtime-map" src="/api/map_feed" alt="Robot Map">

        <div class="hud-overlay">
            <div class="hud-item">
                <i class="fas fa-arrows-to-dot"></i>
                <span>พิกัด: <b id="pos-x">1.24</b>, <b id="pos-y">-0.85</b></span>
            </div>
            <div class="hud-item">
                <i class="fas fa-gauge-high"></i>
                <span>ความเร็ว: <b id="speed">0.22</b> m/s</span>
            </div>
            <div class="hud-item">
                <i class="fas fa-battery-three-quarters"></i>
                <span>แบตเตอรี่: <b id="battery">85</b>%</span>
            </div>
            <div class="hud-item" style="color: #00ff00;">
                <i class="fas fa-robot"></i>
                <span>สถานะ: <b>กำลังเคลื่อนที่</b></span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-video" onclick="history.back()">
            <i class="fas fa-video"></i> สลับไปดูวิดีโอ
        </button>
        <button class="btn btn-cancel" onclick="location.href='/room'">
            <i class="fas fa-xmark"></i> ยกเลิกภารกิจ
        </button>
        <button class="btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="location.href='/arrived?room={{room_id}}'">
            <i class="fas fa-flag-checkered"></i> ทดสอบถึงที่หมาย
        </button>
    </div>

</body>
</html>
